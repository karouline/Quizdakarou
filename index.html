<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz:o quanto você conhece a Karou?</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffb6c1, #ff69b4);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: white;
  overflow: auto;
}

.container {
  background: rgba(255,255,255,0.15);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  width: 90%;
  max-width: 400px;
  text-align: center;
  transition: 0.4s;
}

/* Imagens do quiz */
.quiz-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 15px;
  margin-bottom: 15px;
}

/* Imagem da tela final */
.resultado-img {
  width: 250px;
  height: 250px;
  object-fit: cover;
  border-radius: 20px;
  margin-bottom: 15px;
}

button {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  border-radius: 15px;
  border: none;
  background: white;
  color: #ff1493;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.progress {
  height: 8px;
  background: rgba(255,255,255,0.3);
  border-radius: 10px;
  margin-bottom: 15px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: white;
  transition: 0.4s;
}

.timer {
  font-size: 14px;
  margin-bottom: 10px;
}
</style>
</head>


  
<body>

<audio id="somAcerto" src="acerto.mp3"></audio>
<audio id="somErro" src="erro.mp3"></audio>
  
<!-- TELA DE ENTRADA -->
<div class="container" id="telaEntrada">
  <h2>Bem-vindo ao Quiz da Karou</h2>
  <p>Digite seu nome para começar:</p>
  <input type="text" id="nomeUsuario" placeholder="Seu nome aqui..." 
    style="width:100%; padding:10px; border-radius:10px; border:none; margin-bottom:15px;">
  <button onclick="comecarQuiz()">Começar 💕</button>
</div>

<!-- TELA DO QUIZ -->
<div class="container" id="telaQuiz" style="display:none;">

  <h3 id="nomeExibido"></h3>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="timer" id="timer"></div>
  <h2 id="pergunta"></h2>
  <img id="imagem" class="quiz-img">
  <div id="alternativas"></div>
</div>

<script>
  let nomeJogador = "";
  
const perguntas = [
  {
    pergunta: "qual foi o dia que você tentou concertar meu guarda-chuva?",
    imagem: "foto1.jpg",
    respostas: [
      { texto: "26 de janeiro", correta: false },
      { texto: "30 de janeiro", correta: false },
      { texto: "07 de fevereiro", correta: true },
      { texto: "17 de fevereiro", correta: false }
    ]
  },
  {
    pergunta: "Qual a minha cor favorita?",
    imagem: "foto2.jpg",
    respostas: [
      { texto: "Roxo", correta: false },
      { texto: "Amarelo", correta: true },
      { texto: "Azul", correta: false },
      { texto: "Vermelho", correta: false }
    ]
  },
  {
    pergunta: "Qual o meu animal favorito?",
    imagem: "foto3.jpg",
    respostas: [
      { texto: "Gato", correta: false },
      { texto: "Capivara", correta: false },
      { texto: "Pato", correta: false },
      { texto: "Pombo", correta: true }
    ]
  },
  {
    pergunta: "Quando foi nosso primeiro beijo?",
    imagem: "foto4.jpg",
    respostas: [
      { texto: "10 de novembro de 2023", correta: false },
      { texto: "12 de dezembro de 2023", correta: true },
      { texto: "14 de dezembro de 2023", correta: false },
      { texto: "16 de dezembro de 2023", correta: false }
    ]
  },
  {
    pergunta: "Qual cor de camiseta eu usava no dia em que você elogiou meu cabelo recém cortado?",
    imagem: "foto5.jpg",
    respostas: [
      { texto: "Verde", correta: true },
      { texto: "Amarelo", correta: false },
      { texto: "Azul", correta: false },
      { texto: "Rosa", correta: false }
    ]
  },
  {
    pergunta: "Onde estávamos quando a gente deu o primeiro beijo?",
    imagem: "foto6.jpg",
    respostas: [
      { texto: "Terminal tucuruvi", correta: false },
      { texto: "Shopping", correta: false },
      { texto: "Cantinho", correta: true },
      { texto: "Centro esportivo", correta: false }
    ]
  },
  {
    pergunta: "O que acha mais engraçado em mim?",
    imagem: "foto7.jpg",
    respostas: [
      { texto: "Olhos esbugalhados", correta: false },
      { texto: "Bochechões", correta: true },
      { texto: "Barriguinha", correta: false },
      { texto: "Todas as opções acima", correta: false }
    ]
  },
  
  {
    pergunta: "Quando começamos a namorar?",
    imagem: "foto8.jpg",
    respostas: [
      { texto: "12 de dezembro de 2023", correta: false },
      { texto: "14 de dezembro de 2023", correta: true },
      { texto: "16 de dezembro de 2023", correta: false },
      { texto: "18 de dezembro de 2023", correta: false }
    ]
  },
  {
    pergunta: "Você ainda me ama?",
    imagem: "foto9.jpg",
    respostas: [
      { texto: "Sim", correta: false },
      { texto: "Sim, claro", correta: false },
      { texto: "Com todinha a certeza do mundo", correta: false },
      { texto: "nao", correta: true }
    ]
  },
  {
    pergunta: "Por fim, a mais difícil: qual das opções abaixo eu tenho mais ciúmes?",
    imagem: "foto10.jpg",
    respostas: [
      { texto: "Larissa", correta: false },
      { texto: "Taly", correta: true },
      { texto: "Nick", correta: false },
      { texto: "Todas as opções acima", correta: false }
    ]
  }
];

let perguntaAtual = 0;
let pontos = 0;
let tempo = 10;
let intervalo;

function iniciarTimer() {
  tempo = 10;
  document.getElementById("timer").innerText = "⏳ Tempo: " + tempo;

  intervalo = setInterval(() => {
    tempo--;
    document.getElementById("timer").innerText = "⏳ Tempo: " + tempo;

    if (tempo <= 0) {
      clearInterval(intervalo);
      perguntaAtual++;
      if (perguntaAtual < perguntas.length) {
        mostrarPergunta();
      } else {
        mostrarResultado();
      }
    }
  }, 1000);
}

function comecarQuiz() {
  const input = document.getElementById("nomeUsuario").value.trim();

  if (input === "") {
    alert("Ei 😡 coloca seu nome primeiro!");
    return;
  }

  nomeJogador = input;

  document.getElementById("telaEntrada").style.display = "none";
  document.getElementById("telaQuiz").style.display = "block";

  document.getElementById("nomeExibido").innerText = 
    "Jogador: " + nomeJogador + " 💕";

  mostrarPergunta();
}
  
function mostrarPergunta() {
  clearInterval(intervalo);
  iniciarTimer();

  const pergunta = perguntas[perguntaAtual];
  document.getElementById("pergunta").innerText = pergunta.pergunta;
  document.getElementById("imagem").src = pergunta.imagem;

  document.getElementById("progressBar").style.width =
    ((perguntaAtual) / perguntas.length) * 100 + "%";

  const alternativas = document.getElementById("alternativas");
  alternativas.innerHTML = "";

  pergunta.respostas.forEach(resposta => {
    const botao = document.createElement("button");
    botao.innerText = resposta.texto;

    botao.onclick = () => {
      clearInterval(intervalo);

      if (resposta.correta) {
  pontos++;

  const somAcerto = document.getElementById("somAcerto");
  somAcerto.pause();
  somAcerto.currentTime = 0;
  somAcerto.play().catch(() => {});

} else {

  const somErro = document.getElementById("somErro");
  somErro.pause();
  somErro.currentTime = 0;
  somErro.play().catch(() => {});
      }

      perguntaAtual++;

      setTimeout(() => {
        if (perguntaAtual < perguntas.length) {
          mostrarPergunta();
        } else {
          mostrarResultado();
        }
      }, 700);
    };

    alternativas.appendChild(botao);
  });
}

function mostrarResultado() {
  document.getElementById("progressBar").style.width = "100%";

  let tituloFinal = "";
  let mensagemFinal = "";
  let imagemFinal = "";

  const somVitoria = document.getElementById("somVitoria");

  const porcentagem = (pontos / perguntas.length) * 100;

  // 🏆 100%
  if (porcentagem === 100) {

    tituloFinal = "VOCÊ CONSEGUIU VENCER DOS DEUSES DO OLIMPO";
    mensagemFinal = "Você saiu vitorioso... Por enquanto! Vamos ver como você se sai na cama!";
    imagemFinal = "foto_gabaritou.jpg";

    somVitoria.pause();
    somVitoria.currentTime = 0;
    somVitoria.play().catch(()=>{});

    soltarConfete(); // se você já colocou o confete

  }

  // 😡 0%
  else if (porcentagem === 0) {

    tituloFinal = "😡 COMO ASSIM ZERO???";
    mensagemFinal = "Você é muito burro não sabe estudar, desista dos seus sonhos!";
    imagemFinal = "foto_zero.jpg";

  }

  // 💖 61% a 99%
  else if (porcentagem > 60) {

    tituloFinal = "Eita como estuda 🙄!";
    mensagemFinal = "Não acredito que você errou tantas sendo que é tão inteligente e sabe como estudar!";
    imagemFinal = "foto_quase_perfeito.jpg";

  }

  // 💕 1% a 60%
  else {

    tituloFinal = "Burro!";
    mensagemFinal = "Hummm... Parece que alguém não anda estudando";
    imagemFinal = "foto_meio.jpg";

  }

  document.getElementById("telaQuiz").innerHTML = `
    <h2>${tituloFinal}</h2>
    <img src="${imagemFinal}" class="resultado-img"> style="width:100%; border-radius:20px; margin-bottom:15px;">
    <h3>${nomeJogador}, você acertou ${pontos} de ${perguntas.length} (${porcentagem.toFixed(0)}%)</h3>
    <p>${mensagemFinal}</p>
    <button onclick="location.reload()">Jogar de novo 💕</button>
  `;
}

</script>

</body>
</html>
