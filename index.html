<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz:o quanto você conhece a Karou?</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffb6c1, #ff69b4);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: white;
  overflow: hidden;
}

.container {
  background: rgba(255,255,255,0.15);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  width: 90%;
  max-width: 400px;
  text-align: center;
  transition: 0.4s;
}

img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
  max-height: 200px;
  object-fit: cover;
}

button {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  border-radius: 15px;
  border: none;
  background: white;
  color: #ff1493;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.progress {
  height: 8px;
  background: rgba(255,255,255,0.3);
  border-radius: 10px;
  margin-bottom: 15px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: white;
  transition: 0.4s;
}

.timer {
  font-size: 14px;
  margin-bottom: 10px;
}
</style>
</head>


  
<body>

<audio id="somAcerto" src="acerto.mp3"></audio>
<audio id="somErro" src="erro.mp3"></audio>
  
<!-- TELA DE ENTRADA -->
<div class="container" id="telaEntrada">
  <h2>Bem-vindo ao Quiz da Karou</h2>
  <p>Digite seu nome para começar:</p>
  <input type="text" id="nomeUsuario" placeholder="Seu nome aqui..." 
    style="width:100%; padding:10px; border-radius:10px; border:none; margin-bottom:15px;">
  <button onclick="comecarQuiz()">Começar 💕</button>
</div>

<!-- TELA DO QUIZ -->
<div class="container" id="telaQuiz" style="display:none;">

  <h3 id="nomeExibido"></h3>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="timer" id="timer"></div>
  <h2 id="pergunta"></h2>
  <img id="imagem">
  <div id="alternativas"></div>
</div>

<script>
  let nomeJogador = "";
  
const perguntas = [
  {
    pergunta: "qual foi o dia que você tentou concertar meu guarda-chuva?",
    imagem: "foto1.jpg",
    respostas: [
      { texto: "26 de janeiro", correta: false },
      { texto: "30 de janeiro", correta: true },
      { texto: "07 de fevereiro", correta: false },
      { texto: "17 de fevereiro", correta: false }
    ]
  },
  {
    pergunta: "Qual minha comida favorita? 🍓",
    imagem: "foto2.jpg",
    respostas: [
      { texto: "Pizza", correta: false },
      { texto: "Sushi", correta: true },
      { texto: "Hambúrguer", correta: false },
      { texto: "Lasanha", correta: false }
    ]
  }
];

let perguntaAtual = 0;
let pontos = 0;
let tempo = 10;
let intervalo;

function iniciarTimer() {
  tempo = 10;
  document.getElementById("timer").innerText = "⏳ Tempo: " + tempo;

  intervalo = setInterval(() => {
    tempo--;
    document.getElementById("timer").innerText = "⏳ Tempo: " + tempo;

    if (tempo <= 0) {
      clearInterval(intervalo);
      perguntaAtual++;
      if (perguntaAtual < perguntas.length) {
        mostrarPergunta();
      } else {
        mostrarResultado();
      }
    }
  }, 1000);
}

function comecarQuiz() {
  const input = document.getElementById("nomeUsuario").value.trim();

  if (input === "") {
    alert("Ei 😡 coloca seu nome primeiro!");
    return;
  }

  nomeJogador = input;

  document.getElementById("telaEntrada").style.display = "none";
  document.getElementById("telaQuiz").style.display = "block";

  document.getElementById("nomeExibido").innerText = 
    "Jogador: " + nomeJogador + " 💕";

  mostrarPergunta();
}
  
function mostrarPergunta() {
  clearInterval(intervalo);
  iniciarTimer();

  const pergunta = perguntas[perguntaAtual];
  document.getElementById("pergunta").innerText = pergunta.pergunta;
  document.getElementById("imagem").src = pergunta.imagem;

  document.getElementById("progressBar").style.width =
    ((perguntaAtual) / perguntas.length) * 100 + "%";

  const alternativas = document.getElementById("alternativas");
  alternativas.innerHTML = "";

  pergunta.respostas.forEach(resposta => {
    const botao = document.createElement("button");
    botao.innerText = resposta.texto;

    botao.onclick = () => {
      clearInterval(intervalo);

      if (resposta.correta) {
  pontos++;

  const somAcerto = document.getElementById("somAcerto");
  somAcerto.pause();
  somAcerto.currentTime = 0;
  somAcerto.play().catch(() => {});

} else {

  const somErro = document.getElementById("somErro");
  somErro.pause();
  somErro.currentTime = 0;
  somErro.play().catch(() => {});
      }

      perguntaAtual++;

      setTimeout(() => {
        if (perguntaAtual < perguntas.length) {
          mostrarPergunta();
        } else {
          mostrarResultado();
        }
      }, 700);
    };

    alternativas.appendChild(botao);
  });
}

function mostrarResultado() {
  document.getElementById("progressBar").style.width = "100%";

  let mensagemFinal = "";

  if (pontos === perguntas.length) {
    mensagemFinal = "🏆 Nível: Dessa vez você saiu vitorioso do olimpo!";
  } else if (pontos >= perguntas.length / 2) {
    mensagemFinal = "💘 Nível: ixi fi, estuda viu 🙄";
  } else {
    mensagemFinal = "😡 Nível: ê burrice! Não sabe estudar?";
  }

  document.getElementById("telaQuiz").innerHTML = `
    <h2>Resultado final 💖</h2>
    <h3>${nomeJogador}, você acertou ${pontos} de ${perguntas.length}!</h3>
    <p>${mensagemFinal}</p>
    <button onclick="location.reload()">Jogar de novo 💕</button>
  `;
        }

</script>

</body>
</html>
