<!DOCTYPE html><html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área Secreta 💖</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffb6c1, #ff69b4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: white;
    }.container {
  background: rgba(255, 255, 255, 0.15);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  width: 90%;
  max-width: 400px;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  width: 100%;
  margin-bottom: 15px;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background-color: white;
  color: #ff1493;
  font-weight: bold;
  cursor: pointer;
  margin: 5px;
}

button:hover {
  transform: scale(1.05);
}

.hidden {
  display: none;
}

  </style>
</head>
<body><div class="container" id="login">
  <h2>Digite nossa senha 💌</h2>
  <input type="password" id="password" placeholder="Nossa senha...">
  <button onclick="checkPassword()">Entrar</button>
</div><div class="container hidden" id="content">
  <h1>Feliz Dia dos Namorados 💖</h1>
  <p>Você é o amor da minha vida.</p><button onclick="showMessage()">Nossa História</button> <button onclick="showReasons()">Por que eu te amo</button>

  <p id="extra" style="margin-top:15px;"></p>  <audio id="music" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio><button onclick="toggleMusic()">Tocar / Pausar Música 🎵</button>

</div><script>
  const correctPassword = "nossoamor"; // MUDE AQUI

  function checkPassword() {
    const input = document.getElementById("password").value;
    if (input === correctPassword) {
      document.getElementById("login").classList.add("hidden");
      document.getElementById("content").classList.remove("hidden");
    } else {
      alert("Senha errada 😢");
    }
  }

  function showMessage() {
    document.getElementById("extra").innerText = "Desde o dia que te conheci, minha vida ficou mais feliz. Cada momento com você é especial.";
  }

  function showReasons() {
    document.getElementById("extra").innerText = "Eu te amo pelo seu sorriso, pelo seu carinho, pelo seu jeito único e por ser exatamente quem você é.";
  }

  function toggleMusic() {
    const music = document.getElementById("music");
    if (music.paused) {
      music.play();
    } else {
      music.pause();
    }
  }
</script></body>
</html>
